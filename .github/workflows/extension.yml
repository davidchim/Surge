name: Extension CI/CD

on:
  push:
    tags:
      - "ext-v*"
    branches:
      - main
    paths:
      - "extension/**"
  pull_request:
    paths:
      - "extension/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/extension-checks.yml

  build:
    name: Build (${{ matrix.browser }})
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - name: Update Version
        if: startsWith(github.ref, 'refs/tags/ext-v')
        run: |
          VERSION=${GITHUB_REF_NAME#ext-v}
          echo "Setting version to $VERSION"
          npm version $VERSION --no-git-tag-version
      - name: Build and Package
        run: |
          npm run zip -- -b ${{ matrix.browser }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ matrix.browser }}
          path: extension/output/*.zip
          if-no-files-found: error


  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/ext-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: extension-*
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false

  submit:
    name: Submit (${{ matrix.browser }})
    needs: release
    if: startsWith(github.ref, 'refs/tags/ext-v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: extension/output
          pattern: extension-${{ matrix.browser }}
          merge-multiple: true
      - name: Submit to AMO
        if: matrix.browser == 'firefox'
        run: |
          npx wxt submit \
            --firefox-zip output/*-firefox.zip \
            --firefox-sources-zip output/*-sources.zip
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          FIREFOX_EXTENSION_ID: surge@surge-downloader.com
      - name: Submit to Chrome Web Store
        if: matrix.browser == 'chrome'
        run: |
          npx wxt submit \
            --chrome-zip output/*-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
